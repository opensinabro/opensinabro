{# 편집 폼. base_revision은 편집을 시작한 시점의 리비전이라, 저장 때 3-way 병합의 기준이 된다. #}
<form class="wiki-edit" method="post" action="/edit/{{ title }}">
<input type="hidden" name="csrf_token" value="{{ csrf_token }}">
<input type="hidden" name="base_revision" value="{{ base_revision }}">
{% if let Some(message) = conflict_message %}
<p class="wiki-edit-conflict">{{ message }}</p>
{% endif %}
<textarea name="content" rows="30" aria-label="문서 원문">{{ content }}</textarea>
<label>편집 요약 <input type="text" name="comment" value=""></label>
<button type="submit">저장</button>
<a href="/w/{{ title }}">취소</a>
</form>
